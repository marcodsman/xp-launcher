// Performa box autoexec for SRB2 (software + GPU builds share this).
// Runs AFTER config.cfg, so these override SRB2's defaults and survive
// SRB2 rewriting config.cfg on exit.

showfps 1

// --- Controller bindings for the Twin USB Gamepad on this box ---
// SRB2 reads this pad as a RAW joystick (not SDL GameController), so it
// sees raw button indices. joyN = SDL button (N-1). Physical layout of
// this PS-style pad (from the padwiz mapping):
//   cross/bottom = b2 = joy3   circle/right = b1 = joy2
//   square/left  = b3 = joy4   triangle/top = b0 = joy1
//   LB=joy5 RB=joy6 LT=joy7 RT=joy8  select=joy9 start=joy10
// SRB2's defaults put jump on the TOP button and the menu on a trigger;
// this restores the conventional platformer layout.

setcontrol "jump"       "space"  "joy3"    // cross / bottom
setcontrol "spin"       "lshift" "joy4"    // square / left
setcontrol "custom1"    "z"      "joy2"    // circle / right
setcontrol "custom2"    "x"      "joy1"    // triangle / top
setcontrol "custom3"    "c"      "joy8"    // right trigger
setcontrol "camtoggle"  "v"      "joy6"    // right bumper
setcontrol "centerview" "lctrl"  "joy5"    // left bumper
setcontrol "viewpoint"  "f12"    "joy7"    // left trigger
setcontrol "screenshot" "f8"     "joy9"    // select
setcontrol "systemmenu" "joy10"            // start  -> pause/menu
